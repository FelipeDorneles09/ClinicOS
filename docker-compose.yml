version: "3.9"

networks:
  clinicos-net:
    driver: bridge

volumes:
  postgres_data:

services:
  # ─── Database ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: clinicos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - clinicos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API (Node.js + TypeScript + Express) ───────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: clinicos_api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: ${PORT}
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "${PORT}:${PORT}"
    networks:
      - clinicos-net
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  # ─── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: clinicos_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${PORT}/api
      INTERNAL_API_URL: http://api:${PORT}/api
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - clinicos-net
    depends_on:
      - api
    command: npm run dev
